server {
    listen 80;
    server_name mexicocityblackcar.com www.mexicocityblackcar.com;
    root /var/www/mexicocityblackcar;
    index index.html;
    location = / { try_files /index.html =404; }
    location = /about { try_files /about.html =404; }
    location = /terms { try_files /terms.html =404; }
    location = /mikey { try_files /mikey.html =404; }
    location /api/ { proxy_pass http://127.0.0.1:8000; proxy_read_timeout 120s; proxy_buffering off; }
    location /webhooks/ { proxy_pass http://127.0.0.1:8000; }
    location /health { proxy_pass http://127.0.0.1:8000; }
    gzip on;
}
